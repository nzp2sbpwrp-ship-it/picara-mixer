<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="robots" content="noindex, nofollow, noarchive">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="ピカラ Color Mixer">
<meta name="theme-color" content="#1e293b">
<title>ピカラ サロンワーク最適化ミキサー</title>
<style>
  :root {
    --bg-main: #0f172a;
    --card-bg: #1e293b;
    --text-main: #f8fafc;
    --text-sub: #94a3b8;
    --border-color: #334155;
    --primary: #3b82f6;
    --accent: #10b981;
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
    background-color: var(--bg-main);
    color: var(--text-main);
    margin: 0;
    padding: max(16px, env(safe-area-inset-top)) max(16px, env(safe-area-inset-right)) max(16px, env(safe-area-inset-bottom)) max(16px, env(safe-area-inset-left));
  }

  .container {
    max-width: 600px;
    margin: 0 auto;
  }

  h1 {
    font-size: 1.5rem;
    text-align: center;
    margin-bottom: 1.5rem;
    color: var(--text-main);
    letter-spacing: 0.05em;
  }

  .card {
    background-color: var(--card-bg);
    border: 1px solid var(--border-color);
    border-radius: 12px;
    padding: 16px;
    margin-bottom: 16px;
    box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.3);
  }

  .card-title {
    font-size: 1rem;
    font-weight: bold;
    margin-bottom: 12px;
    border-left: 4px solid var(--primary);
    padding-left: 8px;
  }

  /* 出力部分の強化 */
  .output-box {
    display: flex;
    align-items: center;
    gap: 16px;
  }

  .swatch {
    width: 90px;
    height: 90px;
    border-radius: 12px;
    border: 2px solid var(--border-color);
    box-shadow: inset 0 2px 4px rgba(0,0,0,0.5);
    transition: background-color 0.2s ease;
  }

  .output-details {
    flex: 1;
  }

  .hex-display {
    font-family: monospace;
    font-size: 1.25rem;
    font-weight: bold;
  }

  .recipe-row {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 8px;
  }

  select, input[type="number"], input[type="range"] {
    background-color: #0f172a;
    color: var(--text-main);
    border: 1px solid var(--border-color);
    border-radius: 6px;
    padding: 8px;
    font-size: 0.95rem;
  }

  select { flex: 2; }
  input[type="number"] { flex: 1; max-width: 70px; text-align: center; }

  .remove-btn {
    background-color: #ef4444;
    color: white;
    border: none;
    border-radius: 6px;
    padding: 8px 12px;
    cursor: pointer;
  }

  .add-btn {
    width: 100%;
    background-color: var(--primary);
    color: white;
    border: none;
    border-radius: 8px;
    padding: 10px;
    font-weight: bold;
    cursor: pointer;
    margin-top: 8px;
  }

  .slider-container {
    margin-top: 12px;
  }

  .slider-labels {
    display: flex;
    justify-content: space-between;
    font-size: 0.85rem;
    color: var(--text-sub);
    margin-top: 4px;
  }

  .badge {
    display: inline-block;
    padding: 2px 6px;
    font-size: 0.75rem;
    border-radius: 4px;
    font-weight: bold;
    margin-top: 4px;
  }
  .badge-special { background-color: #8b5cf6; color: white; }
  .badge-base { background-color: #f59e0b; color: black; }
</style>
</head>
<body>

<div class="container">
  <h1>PiCoLoR Pro Mixer</h1>

  <div class="card" style="border: 1px solid var(--primary);">
    <div class="card-title">仕上がり予測イメージ</div>
    <div class="output-box">
      <div id="finalSwatch" class="swatch" style="background-color: #0c0c0c;"></div>
      <div class="output-details">
        <div id="finalHex" class="hex-display">#0C0C0C</div>
        <div id="engineStatus" style="font-size: 0.85rem; color: var(--accent); margin-top: 4px;">計算エンジン: 物理フェード＆くすみ補正</div>
        <div id="recipeSummary" style="font-size: 0.9rem; color: var(--text-sub); margin-top: 4px;">薬剤が選択されていません</div>
      </div>
    </div>
  </div>

  <div class="card">
    <div class="card-title">アンダーレイヤー (ベース髪色)</div>
    <div class="slider-container">
      <label for="baseLevel" style="display:block; margin-bottom:8px;">髪の明るさ (アンダーレベル): <span id="levelLabel" style="font-weight:bold; color:var(--primary);">Lv16</span></label>
      <input type="range" id="baseLevel" min="1" max="20" value="16" style="width:100%;" oninput="onRecipeChange()">
      <div class="slider-labels">
        <span>Lv1</span><span>Lv10</span><span>Lv15</span><span>Lv20</span>
      </div>
    </div>
    <div style="margin-top: 12px; display: flex; gap: 16px; align-items: center;">
      <label><input type="radio" name="baseType" value="standard" checked onchange="onRecipeChange()"> 標準ベース</label>
      <label><input type="radio" name="baseType" value="orange" onchange="onRecipeChange()"> オレンジ茶味ベース</label>
      <div id="baseColorSwatch" style="width:24px; height:24px; border-radius:4px; border:1px solid var(--border-color);"></div>
    </div>
  </div>

  <div class="card">
    <div class="card-title">調合レシピ (最大5種類)</div>
    <div id="recipeContainer">
      </div>
    <button type="button" class="add-btn" onclick="addRecipeRow()">＋ 薬剤を追加</button>
  </div>
</div>

<script>
// マスターデータの統合定義
let picaraColors = {};
let baseLevelColors = {};
let orangeBaseColors = {};

// 初期立ち上げ用フォールバックデータ (jsonロード失敗時用)
const fallbackColors = {
  "picaraColors": {
    "Red": "#461C27", "FPink": "#824352", "Orange": "#963F0F", "Gold": "#BAA24B",
    "Green": "#27413C", "Blue": "#192545", "Cyan": "#1C304A", "Violet": "#40263A",
    "Lapis": "#46447C", "Greige": "#777A7A", "Warm": "#39241F", "Cool": "#3F352A",
    "ALT6": "#332D27", "ALT8": "#48423B", "ALT10": "#5B5753",
    "5BR": "#231915", "7BR": "#38261F", "9BR": "#6C4D38",
    "3BK": "#161513", "5BK": "#241E19", "7BK": "#382E25", "9BK": "#675941",
    "Clear": "#FFFFFF", "Pastel": "#AEADA8", "11BK": "#FFFFFF"
  },
  "baseLevelColors": {
    "1": "#0C0C0C", "2": "#141212", "3": "#1D1816", "4": "#251F1A", "5": "#2E241D",
    "6": "#362B21", "7": "#403126", "8": "#4A392B", "9": "#574230", "10": "#634B37",
    "11": "#6E533B", "12": "#785B3E", "13": "#90724D", "14": "#A08057", "15": "#B38F5F",
    "16": "#BC9E62", "17": "#C9AF73", "18": "#D5C18D", "19": "#DACEA5", "20": "#E6E2D5"
  },
  "orangeBaseColors": {
    "1": "#0E0C0A", "2": "#141211", "3": "#1D1815", "4": "#271E19", "5": "#30231B",
    "6": "#3A2A1F", "7": "#433023", "8": "#4E3728", "9": "#5D402C", "10": "#694932",
    "11": "#755036", "12": "#825739", "13": "#9F6C48", "14": "#B17952", "15": "#C78759",
    "16": "#D09865", "17": "#D8A971", "18": "#DDBE8C", "19": "#DECDA5", "20": "#E7E2D5"
  }
};

// データの読み込み
async function initData() {
  try {
    const res = await fetch('data/colors.json');
    const data = await res.json();
    picaraColors = data.picaraColors || fallbackColors.picaraColors;
    baseLevelColors = data.baseLevelColors || fallbackColors.baseLevelColors;
    // 16Lvの補正を含むオレンジベースの適用
    orangeBaseColors = data.orangeBaseColors || fallbackColors.orangeBaseColors;
    if(orangeBaseColors["16"]) orangeBaseColors["16"] = "#D09865"; 
  } catch (e) {
    console.warn("マスターデータの外部取得に失敗したため内蔵データを使用します", e);
    picaraColors = fallbackColors.picaraColors;
    baseLevelColors = fallbackColors.baseLevelColors;
    orangeBaseColors = fallbackColors.orangeBaseColors;
  }
  
  // 初期レシピとしてBlueを追加
  addRecipeRow("Blue", 1);
  onRecipeChange();
}

function addRecipeRow(selectedColor = "", selectedRatio = 1) {
  const container = document.getElementById("recipeContainer");
  if (container.children.length >= 5) return;

  const row = document.createElement("div");
  row.className = "recipe-row";
  
  let optionsHtml = '<option value="">-- 薬剤を選択 --</option>';
  for (const name in picaraColors) {
    const isSpecial = (name === "Clear" || name === "11BK" || name === "Pastel") ? " (調整剤)" : "";
    const selected = name === selectedColor ? "selected" : "";
    optionsHtml += `<option value="${name}" ${selected}>${name}${isSpecial}</option>`;
  }

  row.innerHTML = `
    <select onchange="onRecipeChange()">${optionsHtml}</select>
    <input type="number" min="1" max="100" value="${selectedRatio}" oninput="onRecipeChange()">
    <span style="color:var(--text-sub)">部</span>
    <button type="button" class="remove-btn" onclick="removeRecipeRow(this)">削除</button>
  `;
  container.appendChild(row);
  onRecipeChange();
}

function removeRecipeRow(button) {
  button.parentElement.remove();
  onRecipeChange();
}

// 高精度計算用：RGBからLab空間への変換ロジック
function hexToRgb(hex) {
  const num = parseInt(hex.replace("#",""), 16);
  return { r: (num >> 16) & 255, g: (num >> 8) & 255, b: num & 255 };
}

function rgbToHex(r, g, b) {
  return "#" + [r, g, b].map(x => {
    const hex = Math.max(0, Math.min(255, Math.round(x))).toString(16);
    return hex.length === 1 ? "0" + hex : hex;
  }).join("").toUpperCase();
}

function rgbToLab(r, g, b) {
  let rL = r / 255, gL = g / 255, bL = b / 255;
  rL = rL > 0.04045 ? Math.pow((rL + 0.055) / 1.055, 2.4) : rL / 12.92;
  gL = gL > 0.04045 ? Math.pow((gL + 0.055) / 1.055, 2.4) : gL / 12.92;
  bL = bL > 0.04045 ? Math.pow((bL + 0.055) / 1.055, 2.4) : bL / 12.92;

  let x = (rL * 0.4124 + gL * 0.3576 + bL * 0.1805) * 100;
  let y = (rL * 0.2126 + gL * 0.7152 + bL * 0.0722) * 100;
  let z = (rL * 0.0193 + gL * 0.1192
