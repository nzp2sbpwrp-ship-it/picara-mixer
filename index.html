<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="robots" content="noindex, nofollow, noarchive">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="ピカラ Color Mixer">
<meta name="theme-color" content="#f8fafc">
<title>ピカラ 実測学習型ミキサー & チャート</title>
<style>
  :root {
    --bg-main: #f8fafc;
    --card-bg: #ffffff;
    --text-main: #0f172a;
    --text-sub: #475569;
    --border-color: #e2e8f0;
    --primary: #4f46e5;
    --primary-light: #e0e7ff;
    --shadow-sm: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
    --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
    --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
    background-color: var(--bg-main);
    color: var(--text-main);
    margin: 0;
    padding: max(16px, env(safe-area-inset-top)) max(16px, env(safe-area-inset-right)) max(16px, env(safe-area-inset-bottom)) max(16px, env(safe-area-inset-left));
    box-sizing: border-box;
    letter-spacing: -0.01em;
  }

  /* 洗練されたプレミアムナビゲーション */
  .screen-nav {
    display: flex;
    gap: 6px;
    margin-bottom: 20px;
    background: #e2e8f0;
    padding: 4px;
    border-radius: 12px;
  }
  .nav-btn {
    flex: 1;
    padding: 10px 14px;
    background: transparent;
    border: none;
    color: var(--text-sub);
    font-size: 13px;
    font-weight: 600;
    border-radius: 9px;
    cursor: pointer;
    transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
  }
  .nav-btn.active {
    background: var(--card-bg);
    color: var(--text-main);
    box-shadow: var(--shadow-sm);
  }

  /* 画面表示切り替え */
  .screen-content {
    display: none;
  }
  .screen-content.active {
    display: block;
  }

  /* プレミアムカードデザイン */
  .card {
    background-color: var(--card-bg);
    border-radius: 16px;
    padding: 20px;
    margin-bottom: 16px;
    border: 1px solid var(--border-color);
    box-shadow: var(--shadow-md);
  }

  h2 {
    font-size: 15px;
    margin-top: 0;
    margin-bottom: 14px;
    color: var(--text-main);
    font-weight: 700;
    letter-spacing: 0.03em;
  }

  /* 調合結果スウォッチ */
  .swatch-container {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 14px;
    margin-bottom: 20px;
  }
  .swatch-box {
    height: 120px;
    border-radius: 14px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    font-weight: 700;
    font-size: 14px;
    color: #ffffff;
    box-shadow: inset 0 1px 2px rgba(255,255,255,0.2), var(--shadow-md);
    text-shadow: 0 1px 2px rgba(0,0,0,0.5);
    border: 1px solid rgba(0,0,0,0.08);
  }
  .swatch-title {
    font-size: 10px;
    opacity: 0.85;
    margin-bottom: 4px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
  }

  /* 2次元カラーチャート用レイアウト */
  .chart-layout {
    display: flex;
    flex-direction: column;
    gap: 16px;
  }
  .hue-selector {
    display: flex;
    gap: 8px;
    overflow-x: auto;
    padding-bottom: 6px;
    scrollbar-width: none;
  }
  .hue-selector::-webkit-scrollbar {
    display: none;
  }
  .hue-chip {
    flex-shrink: 0;
    padding: 8px 14px;
    border-radius: 20px;
    border: 1px solid var(--border-color);
    background: var(--card-bg);
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s ease;
  }
  .hue-chip.active {
    background: var(--text-main);
    color: #ffffff;
    border-color: var(--text-main);
  }

  /* チャートマトリクスのコンテナ構造 */
  .matrix-container {
    position: relative;
    padding-left: 32px;
    padding-bottom: 32px;
    margin-top: 10px;
  }
  
  /* 軸ラベル表現 */
  .axis-y-label {
    position: absolute;
    left: 0;
    top: 50%;
    transform: translateY(-50%) rotate(-90deg);
    font-size: 11px;
    font-weight: 700;
    color: var(--text-sub);
    letter-spacing: 0.1em;
    white-space: nowrap;
  }
  .axis-x-label {
    position: absolute;
    bottom: 0;
    left: 50%;
    transform: translateX(-50%);
    font-size: 11px;
    font-weight: 700;
    color: var(--text-sub);
    letter-spacing: 0.1em;
  }

  .color-matrix {
    display: grid;
    grid-template-columns: repeat(10, 1fr);
    gap: 4px;
    background: #f1f5f9;
    padding: 6px;
    border-radius: 12px;
    border: 1px solid var(--border-color);
  }
  .matrix-cell {
    aspect-ratio: 1;
    border-radius: 6px;
    cursor: pointer;
    transition: transform 0.15s cubic-bezier(0.2, 0.8, 0.2, 1), box-shadow 0.15s ease;
    border: 1px solid rgba(0,0,0,0.05);
  }
  .matrix-cell:hover {
    transform: scale(1.25);
    z-index: 10;
    box-shadow: var(--shadow-lg);
    border-color: #ffffff;
  }

  /* 詳細表示パネル */
  .color-detail-panel {
    display: flex;
    align-items: center;
    gap: 16px;
    background: var(--bg-main);
    padding: 14px;
    border-radius: 12px;
    margin-top: 12px;
    border: 1px solid var(--border-color);
  }
  .detail-preview {
    width: 56px;
    height: 56px;
    border-radius: 10px;
    box-shadow: var(--shadow-md);
    border: 1px solid rgba(0,0,0,0.1);
  }
  .detail-info {
    font-size: 13px;
    color: var(--text-sub);
    line-height: 1.5;
  }
  .detail-hex {
    font-size: 16px;
    font-weight: 700;
    color: var(--text-main);
    font-family: monospace;
  }

  /* パレット・レシピ周り */
  .palette-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 8px;
  }
  .palette-btn {
    padding: 12px 6px;
    border-radius: 10px;
    border: 1px solid var(--border-color);
    background: var(--card-bg);
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    text-align: center;
  }

  /* スライダー表現 */
  .range-group {
    margin-bottom: 16px;
  }
  input[type="range"] {
    -webkit-appearance: none;
    width: 100%;
    height: 5px;
    background: #e2e8f0;
    border-radius: 3px;
    outline: none;
  }
  input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 18px;
    height: 18px;
    border-radius: 50%;
    background: var(--primary);
    cursor: pointer;
    box-shadow: var(--shadow-sm);
    transition: transform 0.1s ease;
  }
  input[type="range"]::-webkit-slider-thumb:hover {
    transform: scale(1.15);
  }
</style>
</head>
<body>

  <div class="screen-nav">
    <button class="nav-btn active" onclick="switchScreen('mixer')">Mixer</button>
    <button class="nav-btn" onclick="switchScreen('chart')">Chart</button>
    <button class="nav-btn" onclick="switchScreen('photo')">Photo</button>
  </div>

  <div id="screenMixer" class="screen-content active">
    <div class="card">
      <div class="swatch-container">
        <div class="swatch-box" id="baseSwatch" style="background: #2E241D;">
          <span class="swatch-title">Under Base</span>
          <span id="baseLabel">Lv5</span>
        </div>
        <div class="swatch-box" id="targetSwatch" style="background: #4f46e5;">
          <span class="swatch-title">Predict Result</span>
          <span id="targetLabel">#4F46E5</span>
        </div>
      </div>

      <div class="range-group">
        <label style="font-size:12px; font-weight:700; color:var(--text-sub);">アンダーベースレベル (1〜20)</label>
        <input type="range" id="baseRange" min="1" max="20" value="5" oninput="updateMixer()">
      </div>
    </div>

    <div class="card">
      <h2>カラーパレット</h2>
      <div class="palette-grid" id="paletteGrid">
        </div>
    </div>
  </div>

  <div id="screenChart" class="screen-content">
    <div class="card">
      <h2>プレミアムカラーマトリクス</h2>
      <div class="chart-layout">
        <div class="hue-selector" id="hueSelector">
          </div>

        <div class="matrix-container">
          <div class="axis-y-label">明度 (Lightness) ──▶ 高</div>
          <div class="color-matrix" id="colorMatrix">
            </div>
          <div class="axis-x-label">彩度 (Saturation) ──▶ 高</div>
        </div>

        <div class="color-detail-panel">
          <div class="detail-preview" id="detailPreview" style="background: #4f46e5;"></div>
          <div class="detail-info">
            <div class="detail-hex" id="detailHex">#4F46E5</div>
            <div id="detailHsl">H: 244° | S: 75% | L: 58%</div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div id="screenPhoto" class="screen-content">
    <div class="card">
      <h2>フォトカラーアナライザー</h2>
      <p style="font-size:13px; color:var(--text-sub);">画像から色を取得して最適な調合バランスを予測します。</p>
    </div>
  </div>

  <script>
    // 状態管理
    let appData = {
      picaraColors: {
        "Red": 0, "FPink": 340, "Orange": 20, "Gold": 45, 
        "Green": 160, "Blue": 220, "Cyan": 195, "Violet": 280, "Lapis": 250
      },
      currentHue: 0, // 初期値Red
      selectedCellColor: "#4F46E5"
    };

    // 画面切り替え
    function switchScreen(screenId) {
      document.querySelectorAll('.screen-content').forEach(el => el.classList.remove('active'));
      document.querySelectorAll('.nav-btn').forEach(el => el.classList.remove('active'));
      
      const targetBtn = Array.from(document.querySelectorAll('.nav-btn')).find(btn => btn.innerText.toLowerCase() === screenId);
      if(targetBtn) targetBtn.classList.add('active');

      if (screenId === 'mixer') document.getElementById('screenMixer').classList.add('active');
      if (screenId === 'chart') {
        document.getElementById('screenChart').classList.add('active');
        renderColorChart();
      }
      if (screenId === 'photo') document.getElementById('screenPhoto').classList.add('active');
    }

    // パレット初期化
    function initPalette() {
      const grid = document.getElementById('paletteGrid');
      grid.innerHTML = Object.keys(appData.picaraColors).map(name => `
        <button class="palette-btn" onclick="selectPaletteColor('${name}')">${name}</button>
      `).join('');
    }

    function selectPaletteColor(name) {
      appData.currentHue = appData.picaraColors[name];
      switchScreen('chart');
    }

    // カラーチャート画面の生成ロジック（上：高明度、右：高彩度）
    function renderColorChart() {
      // 色相セレクター初期化
      const selector = document.getElementById('hueSelector');
      selector.innerHTML = Object.keys(appData.picaraColors).map(name => {
        const activeClass = appData.picaraColors[name] === appData.currentHue ? 'active' : '';
        return `<button class="hue-chip ${activeClass}" onclick="changeChartHue(${appData.picaraColors[name]})">${name}</button>`;
      }).join('');

      // マトリクス初期化 (10x10)
      const matrix = document.getElementById('colorMatrix');
      matrix.innerHTML = '';

      // 縦軸（明度L）: 上に行くほど高明度にするため、90%から10%へデクリメント
      for (let l = 9; l >= 1; l--) {
        // 横軸（彩度S）: 右に行くほど高彩度にするため、10%から100%へインクリメント
        for (let s = 1; s <= 10; s++) {
          const hue = appData.currentHue;
          const saturation = s * 10;
          const lightness = l * 10;
          const hex = hslToHex(hue, saturation, lightness);

          const cell = document.createElement('div');
          cell.className = 'matrix-cell';
          cell.style.background = hex;
          cell.title = `H:${hue} S:${saturation}% L:${lightness}%`;
          cell.onclick = () => updateDetailPanel(hex, hue, saturation, lightness);
          
          matrix.appendChild(cell);
        }
      }
    }

    function changeChartHue(hueValue) {
      appData.currentHue = hueValue;
      renderColorChart();
    }

    function updateDetailPanel(hex, h, s, l) {
      document.getElementById('detailPreview').style.background = hex;
      document.getElementById('detailHex').innerText = hex.toUpperCase();
      document.getElementById('detailHsl').innerText = `H: ${h}° | S: ${s}% | L: ${l}%`;
    }

    // HSLからHEXへの滑らかな変換ロジック
    function hslToHex(h, s, l) {
      l /= 100;
      const a = s * Math.min(l, 1 - l) / 100;
      const f = n => {
        const k = (n + h / 30) % 12;
        const color = l - a * Math.max(Math.min(k - 3, 9 - k, 1), -1);
        return Math.round(255 * color).toString(16).padStart(2, '0');
      };
      return `#${f(0)}${f(8)}${f(4)}`;
    }

    function updateMixer() {
      const lv = document.getElementById('baseRange').value;
      document.getElementById('baseLabel').innerText = `Lv${lv}`;
      // 実際のアプリではここでcolors.jsonなどのベースHEXとリアルタイム演算を行います
    }

    // 初回起動処理
    window.addEventListener('DOMContentLoaded', () => {
      initPalette();
      renderColorChart();
    });
  </script>
</body>
</html>
